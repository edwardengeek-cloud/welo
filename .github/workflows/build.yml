name: Build Aidoku Source

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Build WeLoMa Source
        working-directory: ./en.weloma
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build --release --target wasm32-unknown-unknown

      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: weloma-aidoku
          path: en.weloma/target/wasm32-unknown-unknown/release/weloma_aidoku.wasm
