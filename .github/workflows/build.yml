name: Build WeLoMa Source

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build Source
        working-directory: ./en.weloma
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: weloma-aidoku
          path: en.weloma/target/wasm32-unknown-unknown/release/libweloma_aidoku.wasm   # Fixed name
